name: Update Dashboard Data

on:
  schedule:
    - cron: '0 */6 * * *'   # runs every 6 hours automatically
  workflow_dispatch:          # also allows manual trigger anytime

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run data injection script
        run: python scripts/inject_data.py

      - name: Commit updated index.html if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: auto-refresh dashboard data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
